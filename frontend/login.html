<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GameVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body class="auth-page">
    <canvas id="bg-canvas"></canvas>
    
    <div class="auth-container">
        <div class="auth-3d-visual" id="auth3d">
            <div class="floating-elements">
                <div class="float-element gamepad">🎮</div>
                <div class="float-element star">⭐</div>
                <div class="float-element trophy">🏆</div>
                <div class="float-element gem">💎</div>
            </div>
        </div>
        
        <div class="auth-form-container glass">
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Login</button>
                <button class="auth-tab" data-tab="signup">Sign Up</button>
                <div class="tab-indicator"></div>
            </div>

            <form class="auth-form" id="loginForm">
                <div class="form-header">
                    <h2>Welcome Back!</h2>
                    <p>Continue your gaming journey</p>
                </div>
                
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✉️</span>
                        <input type="email" id="loginEmail" class="form-input" placeholder="your@email.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required>
                        <button type="button" class="toggle-password">👁️</button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-glow btn-large btn-full">
                    <span>Login</span>
                    <div class="btn-loader" hidden></div>
                </button>

                <div class="social-login">
                    <p>Or continue with</p>
                    <div class="social-buttons">
                        <button type="button" class="btn btn-social">
                            <span>🔍</span> Google
                        </button>
                        <button type="button" class="btn btn-social">
                            <span>🐙</span> GitHub
                        </button>
                    </div>
                </div>
            </form>

            <form class="auth-form hidden" id="signupForm">
                <div class="form-header">
                    <h2>Create Account</h2>
                    <p>Join the gaming revolution</p>
                </div>
                
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="signupName" class="form-input" placeholder="John Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✉️</span>
                        <input type="email" id="signupEmail" class="form-input" placeholder="your@email.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="signupPassword" class="form-input" placeholder="••••••••" required>
                        <div class="password-strength" id="passwordStrength"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupConfirm">Confirm Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="signupConfirm" class="form-input" placeholder="••••••••" required>
                    </div>
                </div>

                <label class="checkbox terms">
                    <input type="checkbox" id="agreeTerms" required>
                    <span class="checkmark"></span>
                    I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                </label>

                <button type="submit" class="btn btn-glow btn-large btn-full">
                    <span>Create Account</span>
                    <div class="btn-loader" hidden></div>
                </button>
            </form>
        </div>
    </div>

    <script src="js/three-bg.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
